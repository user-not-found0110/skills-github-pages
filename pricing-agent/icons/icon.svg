<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4d8c"/>
      <stop offset="100%" style="stop-color:#1a7fd4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- House shape -->
  <polygon points="256,110 120,230 155,230 155,390 357,390 357,230 392,230" fill="#ffffff" opacity="0.95"/>
  <!-- House door -->
  <rect x="221" y="300" width="70" height="90" rx="6" fill="#0a4d8c" opacity="0.7"/>
  <!-- Dollar sign circle -->
  <circle cx="355" cy="355" r="85" fill="#00bcd4"/>
  <!-- Dollar sign -->
  <text x="355" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="100" font-weight="900" fill="#ffffff">$</text>
</svg>
