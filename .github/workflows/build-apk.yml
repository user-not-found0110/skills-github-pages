name: Build Android APK

on:
  push:
    branches:
      - claude/android-missed-call-sms-bcbav
      - main
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          sudo ln -sf /opt/gradle-8.2/bin/gradle /usr/local/bin/gradle

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android-app/local.properties

      - name: Verify Gradle version
        run: gradle --version

      - name: Build debug APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MissedCallSMS-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
